<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inflation Regret Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .container { max-width: 720px; margin: auto; }
    form > div { margin-bottom: 12px; }
    label { display: block; font-weight: bold; margin-bottom: 4px; }
    input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 10px 18px; border: none; border-radius: 4px; background: #007bff; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Inflation Regret Calculator</h1>
    <p>Get the future cost, purchasing power loss, and regret score for your decision.</p>

    <form action="{{ url_for('result') }}" method="post">
      <div>
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Bought a car for R200000 in 2015" rows="2" required></textarea>
      </div>

      <div>
        <label for="initial_amount">Initial Amount (R)</label>
        <input type="number" id="initial_amount" name="initial_amount" min="0" step="0.01" placeholder="1200" required>
      </div>

      <div>
        <label for="start_year">Start Year</label>
        <input type="number" id="start_year" name="start_year" min="1900" max="2100" value="2023" required>
      </div>

      <div>
        <label for="end_year">End Year</label>
        <input type="number" id="end_year" name="end_year" min="1900" max="2100" value="2026" required>
      </div>

      <div>
        <label for="inflation_rate">Inflation Rate (%)</label>
        <input type="number" id="inflation_rate" name="inflation_rate" min="0" step="0.01" value="6.00" required>
      </div>

      <button type="submit">Calculate Regret</button>
    </form>
  </div>
</body>
</html>
